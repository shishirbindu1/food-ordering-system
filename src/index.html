<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
</head>

<body>
  <div class="wrapper">
    <div class="header"></div>
    <div class="heroSection">
      <div class="totalTable grid grid-cols-5 gap-y-5">

      </div>
      <div class="menu hidden">
        <button class="backButton">Back</button>
        <p class="selectedTable"></p>
        <h1 class="font-bold text-2xl">menu item below</h1>

        <div class="orderFromTable my-10 w-1/2">
          <table class="w-full border-collapse">
            <thead>
              <tr class="border-b-2">
                <th class="text-left py-2">Item</th>
                <th class="text-center py-2">Qty</th>
                <th class="text-right py-2">Price</th>
                <th class="text-right py-2">Total</th>
              </tr>
            </thead>

            <tbody class="cartItems">



            </tbody>

            <tfoot>
              <tr class="border-t-2 font-bold">
                <td colspan="3" class="text-right pt-5">
                  Grand Total
                </td>
                <td class="text-right pt-3 totalPrice">
                  Rs. 0
                </td>
              </tr>
            </tfoot>

          </table>
        </div>
        <div class="wrapMenu grid grid-cols-4 gap-y-5">

        </div>
      </div>
    </div>
    <div class="footer"></div>
  </div>
</body>
<script type="module" src="../scriptfile/index.js"></script>

</html>
